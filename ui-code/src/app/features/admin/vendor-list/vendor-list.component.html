<div class="space-y-6 max-w-9xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-slate-900">Vendor Management</h1>
      <p class="text-sm text-slate-500 mt-1">Manage all registered vendors and their platform status.</p>
    </div>
    <div class="flex space-x-3">
      <button (click)="goBack()"
        class="bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-md text-sm font-medium hover:bg-slate-50 transition-colors">
        Back to Dashboard
      </button>
      <button routerLink="/shop/register-vendor"
        class="bg-blue-600 text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-blue-700 transition-colors shadow-sm">
        Add New Vendor
      </button>
    </div>
  </div>

  <!-- Filters & Search -->
  <div
    class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col md:flex-row gap-4 items-center justify-between">
    <div class="relative w-full md:w-96">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
      <input type="text"
        class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg bg-slate-50 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all sm:text-sm"
        placeholder="Search vendors by name, ID or category...">
    </div>
    <div class="flex gap-2 w-full md:w-auto">
      <select (change)="onStatusChange($event)" [value]="selectedStatus"
        class="block w-full md:w-40 pl-3 pr-10 py-2 text-base border-slate-300 focus:outline-none focus:ring-blue-500 rounded-lg bg-slate-50 sm:text-sm">
        <option>All Statuses</option>
        <option>Active</option>
        <option>Pending</option>
        <option>Verified</option>
        <option>Suspended</option>
      </select>
    </div>
  </div>

  <!-- Full Vendor Table -->
  <div class="bg-white shadow-sm rounded-xl border border-slate-200 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-slate-200">
        <thead class="bg-slate-50">
          <tr>
            <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">
              Vendor</th>
            <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">
              Category</th>
            <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">
              Total Sales</th>
            <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">
              Status</th>
            <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">
              Applied Date</th>
            <th scope="col" class="relative px-6 py-3"><span class="sr-only">Actions</span></th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-slate-200">
          <tr *ngFor="let vendor of vendors" class="hover:bg-slate-50 transition-colors">
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="flex items-center">
                <div
                  class="h-10 w-10 flex-shrink-0 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600 font-bold text-xs">
                  {{vendor.name.substring(0,2).toUpperCase()}}
                </div>
                <div class="ml-4">
                  <!-- <div class="text-sm font-bold text-slate-900">{{vendor.category}}</div> -->
                  <!-- <div class="text-xs text-slate-500 font-mono">{{vendor.verificationId}}</div> -->
                </div>
              </div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <span
                class="text-sm text-slate-600 bg-slate-100 px-2 py-1 rounded text-xs font-medium uppercase tracking-tighter">{{vendor.category}}</span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-slate-900">
              {{vendor.totalEarnings | currency}}
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <span [ngClass]="{
                'bg-emerald-100 text-emerald-800 border-emerald-200': vendor.status?.toUpperCase() === 'ACTIVE',
                'bg-blue-100 text-blue-800 border-blue-200': vendor.status?.toUpperCase() === 'VERIFIED',
                'bg-yellow-100 text-yellow-800 border-yellow-200': vendor.status?.toUpperCase() === 'IN REVIEW',
                'bg-slate-100 text-slate-800 border-slate-200': vendor.status?.toUpperCase() === 'PENDING'
              }" class="px-2.5 py-1 inline-flex text-xs leading-5 font-semibold rounded-full border">
                {{vendor.status | titlecase}}
              </span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">
              {{vendor.createdAt | date}}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
              <button *ngIf="vendor.status?.toUpperCase() === 'PENDING' || vendor.status?.toUpperCase() === 'IN REVIEW'"
                (click)="onVerify(vendor.id)" class="text-emerald-600 hover:text-emerald-800 font-bold mr-3">
                Verify
              </button>
              <button [routerLink]="['/admin/vendor', vendor.id]"
                class="text-blue-600 hover:text-blue-900 font-bold">Details</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
